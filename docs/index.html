<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 트렌드센싱 페이지(테스트페이지)</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Open Graph (메신저 미리보기) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="AI 트렌드센싱 대시보드">
    <meta property="og:description" content="과학기술정보통신부 AI 트렌드 수집 및 분석 시스템">
    <meta property="og:image" content="https://tnt-ooo-tnt.github.io/trendsensing-dashboard/og-image.png">
    <meta property="og:url" content="https://tnt-ooo-tnt.github.io/trendsensing-dashboard/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI 트렌드센싱 대시보드">
    <meta name="twitter:description" content="과학기술정보통신부 AI 트렌드 수집 및 분석 시스템">
    <meta name="twitter:image" content="https://tnt-ooo-tnt.github.io/trendsensing-dashboard/og-image.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-top">
        <span>AI Trend Sensing System</span>
        <span id="clock"></span>
    </div>
    <div class="header-main">
        <div class="header-emblem"><img src="favicon.svg" alt="과학기술정보통신부" width="28" height="28"></div>
        <div>
            <div class="header-title">
                AI 트렌드센싱
                <span class="test-badge" id="mode-badge">TEST</span>
            </div>
            <div class="header-subtitle">AI 트렌드 수집 및 분석 대시보드</div>
        </div>
        <button class="mode-toggle-btn" id="mode-toggle" onclick="toggleViewMode()">
            <span id="mode-toggle-label">배포 모드</span>
        </button>
    </div>
</header>

<!-- Date Navigation -->
<nav class="date-nav">
    <button class="date-nav-btn" id="btn-prev" onclick="navigateDate(1)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        이전
    </button>
    <div class="date-display">
        <div class="date-display-main" id="date-main"></div>
        <div class="date-display-sub" id="date-sub"></div>
    </div>
    <button class="date-nav-btn" id="btn-next" onclick="navigateDate(-1)">
        다음
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
</nav>

<!-- Dashboard -->
<main class="dashboard" id="dashboard">
    <div class="loading" id="loading">데이터를 불러오는 중...</div>
</main>

<!-- Footer -->
<footer class="footer">
    TrendSensing Bot &mdash; AI 트렌드 수집 및 분석 시스템<br>
    Powered by Ollama/Qwen3:14b &middot; Data from X(Twitter)
</footer>

<script>
let DATES = [];
let currentIdx = 0;

const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];

function kstToday() {
    var now = new Date();
    var kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
    return kst.getFullYear() + '-' + String(kst.getMonth()+1).padStart(2,'0') + '-' + String(kst.getDate()).padStart(2,'0');
}

var ICON_GOV = '<svg width="18" height="18" viewBox="-2 -2 80 80" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M57.003 36.268C50.593 31.778 42.374 33.609 38.064 40.36C34.461 46 29.026 46.697 26.92 46.697C20.063 46.697 15.366 41.732 13.973 36.59C13.959 36.536 13.951 36.498 13.936 36.444C13.921 36.383 13.906 36.33 13.892 36.268C13.348 34.123 13.207 33.096 13.207 30.82C13.207 18.529 25.46 4.843 43.104 4.843C60.748 4.843 71.512 19.004 74.178 26.874C74.133 26.736 74.088 26.598 74.044 26.452C68.922 11.065 54.74 0 38.049 0C17.041 0 0 17.533 0 39.165C0 58.498 13.549 75.05 32.339 75.05C47.325 75.05 57.405 66.399 62.021 54.483C64.559 47.962 62.758 40.299 57.003 36.276Z" fill="#003863"/>' +
    '<path d="M74.424 27.641C72.206 19.963 61.783 4.852 43.112 4.852C25.461 4.852 13.215 18.537 13.215 30.829C13.215 33.104 13.349 34.131 13.9 36.277C13.669 35.342 13.55 34.4 13.55 33.48C13.55 20.683 26.005 11.809 38.802 11.809C56.133 11.809 70.173 26.269 70.173 44.101C70.173 58.085 62.356 70.185 50.996 75.993C65.632 70.545 76.092 56.116 76.092 39.166C76.092 35.158 75.571 31.618 74.417 27.641Z" fill="#E4032E"/>' +
    '</svg>';
const PRIORITY_ACCOUNTS = [
    { handle: 'Jaemyung_Lee', label: '\uc774\uc7ac\uba85 \ub300\ud1b5\ub839', icon: '\uD83C\uDDF0\uD83C\uDDF7' },
    { handle: 'msitminister', label: '\ubc30\uacbd\ud6c8 \uacfc\ud559\uae30\uc220\ubd80\ucd1d\ub9ac \uacb8 \uacfc\ud559\uae30\uc220\uc815\ubcf4\ud1b5\uc2e0\ubd80 \uc7a5\uad00', icon: ICON_GOV }
];

async function init() {
    updateClock();
    setInterval(updateClock, 1000);

    try {
        const resp = await fetch('data/dates.json');
        DATES = await resp.json();
    } catch (e) {
        DATES = [];
    }

    const TODAY = kstToday();

    if (DATES.length === 0) {
        DATES = [TODAY];
    }

    // 오늘 날짜가 목록에 없으면 맨 앞에 삽입
    if (DATES.indexOf(TODAY) < 0) {
        DATES.unshift(TODAY);
    }

    currentIdx = DATES.indexOf(TODAY);
    loadDate(DATES[currentIdx]);
}

function updateClock() {
    const now = new Date();
    const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
    document.getElementById('clock').textContent =
        'KST ' + kst.getFullYear() + '.' +
        String(kst.getMonth()+1).padStart(2,'0') + '.' +
        String(kst.getDate()).padStart(2,'0') + ' ' +
        String(kst.getHours()).padStart(2,'0') + ':' +
        String(kst.getMinutes()).padStart(2,'0') + ':' +
        String(kst.getSeconds()).padStart(2,'0');
}

function navigateDate(delta) {
    const newIdx = currentIdx + delta;
    if (newIdx < 0 || newIdx >= DATES.length) return;
    currentIdx = newIdx;
    loadDate(DATES[currentIdx]);
}

function updateDateDisplay(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const dayName = DAY_NAMES[d.getDay()];
    const main = d.getFullYear() + '\ub144 ' + (d.getMonth()+1) + '\uc6d4 ' + d.getDate() + '\uc77c (' + dayName + ')';
    document.getElementById('date-main').textContent = main;

    var todayStr = kstToday();
    document.getElementById('date-sub').textContent = dateStr === todayStr ? '\uc624\ub298' : '';

    document.getElementById('btn-prev').disabled = currentIdx >= DATES.length - 1;
    document.getElementById('btn-next').disabled = currentIdx <= 0;
}

async function loadDate(dateStr) {
    updateDateDisplay(dateStr);
    const dashboard = document.getElementById('dashboard');
    dashboard.innerHTML = '<div class="loading">\ub370\uc774\ud130\ub97c \ubd88\ub7ec\uc624\ub294 \uc911...</div>';

    try {
        const resp = await fetch('data/' + dateStr + '.json');
        if (!resp.ok) {
            renderDashboard({
                total: 0, ai_true: 0, ai_false: 0,
                avg_confidence: 0, source_counts: {}, top_themes: [], posts: []
            });
            return;
        }
        const data = await resp.json();
        renderDashboard(data);
    } catch (e) {
        showNoData("\ub370\uc774\ud130 \ub85c\ub529 \uc911 \uc624\ub958\uac00 \ubc1c\uc0dd\ud588\uc2b5\ub2c8\ub2e4.", e.message);
    }
}

function showNoData(title, sub) {
    document.getElementById('dashboard').innerHTML =
        '<div class="no-data"><h3>' + title + '</h3>' +
        (sub ? '<p>' + sub + '</p>' : '') + '</div>';
}

function getConfColor(conf) {
    if (conf >= 0.7) return '#059669';
    if (conf >= 0.4) return '#D97706';
    return '#DC2626';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function linkify(text) {
    var escaped = escapeHtml(text);
    return escaped.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--primary-light)">$1</a>');
}

function renderDashboard(data) {
    const dashboard = document.getElementById('dashboard');
    let html = '';

    // Stats
    html += '<div class="stats-row">' +
        '<div class="stat-card stat-total"><div class="stat-value">' + data.total + '</div><div class="stat-label">총 수집 게시물</div></div>' +
        '<div class="stat-card success"><div class="stat-value">' + data.ai_true + '</div><div class="stat-label">AI 트렌드 관련</div></div>' +
        '<div class="stat-card stat-non-ai"><div class="stat-value">' + data.ai_false + '</div><div class="stat-label">비관련</div></div>' +
        '<div class="stat-card highlight stat-confidence"><div class="stat-value">' + data.avg_confidence + '</div><div class="stat-label">평균 신뢰도</div></div>' +
        '</div>';

    // Split posts: priority vs general
    var priorityHandles = PRIORITY_ACCOUNTS.map(function(a) { return a.handle; });
    var generalPosts = [];
    var priorityPostMap = {};
    PRIORITY_ACCOUNTS.forEach(function(a) { priorityPostMap[a.handle] = []; });

    data.posts.forEach(function(p) {
        if (priorityHandles.indexOf(p.account_handle) >= 0) {
            priorityPostMap[p.account_handle].push(p);
        } else {
            generalPosts.push(p);
        }
    });

    // Priority account sections
    PRIORITY_ACCOUNTS.forEach(function(acct, idx) {
        var posts = priorityPostMap[acct.handle] || [];
        var pAiTrue = posts.filter(function(p) { return p.is_ai_trend; }).length;
        var pAiFalse = posts.length - pAiTrue;
        var listId = 'priority-list-' + idx;

        html += '<div class="section priority-section"><div class="section-header priority-header">' +
            acct.icon + ' ' + escapeHtml(acct.label) +
            '<span class="priority-count count-all">' + posts.length + '건</span>' +
            '<span class="priority-count count-ai-only">' + pAiTrue + '건</span>' +
            '</div>';
        if (posts.length > 0) {
            var hasAi = pAiTrue > 0;
            var wrapperClass = 'posts-wrapper' + (pAiTrue === 0 ? ' posts-wrapper-no-ai' : '');
            html += '<div class="' + wrapperClass + '" style="padding-top:16px"><div class="tab-filter filter-tabs">' +
                '<button class="tab-btn active" onclick="filterPosts(\'all\', this, \'' + listId + '\')">전체 (' + posts.length + ')</button>' +
                '<button class="tab-btn" onclick="filterPosts(\'ai\', this, \'' + listId + '\')">AI 관련 (' + pAiTrue + ')</button>' +
                '<button class="tab-btn" onclick="filterPosts(\'not-ai\', this, \'' + listId + '\')">비관련 (' + pAiFalse + ')</button>' +
                '</div><div class="section-body" id="' + listId + '">';
            posts.forEach(function(p) { html += renderPostCard(p); });
            html += '</div></div>';
            if (pAiTrue === 0) {
                html += '<div class="prod-only-empty section-body"><div class="no-data" style="padding:32px">해당 기간에 수집된 게시물이 없습니다.</div></div>';
            }
        } else {
            html += '<div class="section-body"><div class="no-data" style="padding:32px">해당 기간에 수집된 게시물이 없습니다.</div></div>';
        }
        html += '</div>';
    });

    // General posts (excluding priority accounts)
    var generalAiTrue = generalPosts.filter(function(p) { return p.is_ai_trend; }).length;
    var generalAiFalse = generalPosts.length - generalAiTrue;

    html += '<div class="section priority-section"><div class="section-header priority-header"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> 국내외 AI 동향' +
        '<span class="priority-count count-all">' + generalPosts.length + '건</span>' +
        '<span class="priority-count count-ai-only">' + generalAiTrue + '건</span>' +
        '</div>';
    if (generalPosts.length > 0) {
        var generalWrapperClass = 'posts-wrapper' + (generalAiTrue === 0 ? ' posts-wrapper-no-ai' : '');
        html += '<div class="' + generalWrapperClass + '" style="padding-top:16px">' +
            '<div class="tab-filter filter-tabs">' +
            '<button class="tab-btn active" onclick="filterPosts(\'all\', this, \'post-list\')">전체 (' + generalPosts.length + ')</button>' +
            '<button class="tab-btn" onclick="filterPosts(\'ai\', this, \'post-list\')">AI 관련 (' + generalAiTrue + ')</button>' +
            '<button class="tab-btn" onclick="filterPosts(\'not-ai\', this, \'post-list\')">비관련 (' + generalAiFalse + ')</button>' +
            '</div><div class="section-body" id="post-list">';
        generalPosts.forEach(function(p) { html += renderPostCard(p); });
        html += '</div></div>';
        if (generalAiTrue === 0) {
            html += '<div class="prod-only-empty section-body"><div class="no-data" style="padding:32px">해당 기간에 수집된 게시물이 없습니다.</div></div>';
        }
    } else {
        html += '<div class="section-body"><div class="no-data" style="padding:32px">해당 기간에 수집된 게시물이 없습니다.</div></div>';
    }
    html += '</div>';

    // Sources
    var srcEntries = Object.entries(data.source_counts).sort(function(a,b){return b[1]-a[1]});
    var srcTotal = srcEntries.reduce(function(s,e){return s+e[1]}, 0);
    html += '<div class="section section-sources"><div class="section-header"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> 수집 출처별 현황</div><div class="section-body">' +
        '<table class="source-table"><thead><tr><th>출처</th><th>수집 건수</th></tr></thead><tbody>';
    srcEntries.forEach(function(e) {
        html += '<tr><td>@' + escapeHtml(e[0]) + '</td><td>' + e[1] + '건</td></tr>';
    });
    html += '<tr class="total-row"><td>합계</td><td>' + srcTotal + '건</td></tr></tbody></table></div></div>';

    // Themes (현재 숨김)
    // if (data.top_themes && data.top_themes.length > 0) {
    //     html += '<div class="section"><div class="section-header">&#128204; 주요 테마</div><div class="section-body"><div class="theme-tags">';
    //     data.top_themes.forEach(function(t) {
    //         html += '<span class="theme-tag">' + escapeHtml(t[0]) + '<span class="count">' + t[1] + '</span></span>';
    //     });
    //     html += '</div></div></div>';
    // }

    dashboard.innerHTML = html;
}

function formatPlatform(raw) {
    return raw.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function renderPostCard(p) {
    var aiClass = p.is_ai_trend ? 'ai-true' : 'ai-false';
    var badgeClass = p.is_ai_trend ? 'ai' : 'not-ai';
    var badgeText = p.is_ai_trend ? 'AI \uad00\ub828' : '\ube44\uad00\ub828';
    var conf = p.ai_confidence != null ? p.ai_confidence : 0;
    var confPct = Math.round(conf * 100);
    var confColor = getConfColor(conf);

    var bodyHtml = '';
    if (p.is_ai_trend && p.ai_title) {
        bodyHtml += '<div class="post-title-ko">' + escapeHtml(p.ai_title) + '</div>';
        if (p.ai_bullets && p.ai_bullets.length > 0) {
            bodyHtml += '<ul class="post-bullets">';
            p.ai_bullets.forEach(function(b) { bodyHtml += '<li>' + escapeHtml(b) + '</li>'; });
            bodyHtml += '</ul>';
        }
    }

    if (p.content_ko) {
        bodyHtml += '<div class="post-translation"><div class="post-original-label">\ud55c\uad6d\uc5b4 \ubc88\uc5ed</div>' + linkify(p.content_ko) + '</div>';
    }

    bodyHtml += '<div class="post-original"><div class="post-original-label">\uc6d0\ubb38</div>' + linkify(p.content) + '</div>';

    if (p.ai_themes && p.ai_themes.length > 0) {
        bodyHtml += '<div class="post-themes">';
        p.ai_themes.forEach(function(t) { bodyHtml += '<span class="post-theme-chip">' + escapeHtml(t) + '</span>'; });
        bodyHtml += '</div>';
    }

    if (p.url) {
        bodyHtml += '<a class="post-link" href="' + escapeHtml(p.url) + '" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> \uc6d0\ubb38 \ubcf4\uae30</a>';
    }

    return '<div class="post-card ' + aiClass + '" data-ai="' + p.is_ai_trend + '">' +
        '<div class="post-card-header"><div class="post-meta">' +
        '<span class="post-platform">' + escapeHtml(formatPlatform(p.platform)) + '</span>' +
        '<span class="post-handle">@' + escapeHtml(p.account_handle) + (p.display_name ? ' (' + escapeHtml(p.display_name) + ')' : '') + '</span>' +
        '<span style="color:var(--text-tertiary);font-size:11px">' + escapeHtml(p.published_at) + '</span>' +
        '</div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +
        '<span class="post-badge ' + badgeClass + '">' + badgeText + '</span>' +
        '<span class="confidence-info" style="font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary)">' + confPct + '%</span>' +
        '<span class="confidence-bar confidence-info"><span class="confidence-fill" style="width:' + confPct + '%;background:' + confColor + '"></span></span>' +
        '</div></div><div class="post-card-body">' + bodyHtml + '</div></div>';
}

function filterPosts(type, btn, listId) {
    btn.parentElement.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('#' + listId + ' .post-card').forEach(function(card) {
        var isAi = card.dataset.ai === 'true';
        if (type === 'all') card.style.display = '';
        else if (type === 'ai') card.style.display = isAi ? '' : 'none';
        else card.style.display = isAi ? 'none' : '';
    });
}

// === View Mode Toggle ===
var viewMode = 'test';

function toggleViewMode() {
    viewMode = viewMode === 'test' ? 'production' : 'test';
    document.body.classList.toggle('production-mode', viewMode === 'production');

    var badge = document.getElementById('mode-badge');
    var label = document.getElementById('mode-toggle-label');

    if (viewMode === 'production') {
        badge.textContent = '\uBC30\uD3EC\uC6A9';
        badge.classList.add('deploy-badge');
        label.textContent = '\uD14C\uC2A4\uD2B8 \uBAA8\uB4DC';
    } else {
        badge.textContent = 'TEST';
        badge.classList.remove('deploy-badge');
        label.textContent = '\uBC30\uD3EC \uBAA8\uB4DC';
    }
}

init();
</script>
</body>
</html>
